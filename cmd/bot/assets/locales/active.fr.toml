PrivacyPolicy = """<b>POLITIQUE DE CONFIDENTIALITÉ</b>

<b>Date d'entrée en vigueur : 15 mars 2026</b>

La présente Politique de confidentialité explique quelles données nous collectons, comment nous les utilisons et comment nous les protégeons lors de l'utilisation du service <b>The BEYOND</b> (ci-après — « le Service », « Nous »).

Nous sommes basés en Suisse et respectons les normes de confidentialité les plus strictes.

En utilisant notre Service, vous acceptez la présente Politique.

<b>1. Quelles données nous collectons</b>
Nous collectons <b>uniquement le minimum de données</b> nécessaires au fonctionnement du service :
- <b>Telegram User ID</b> — pour l'identification du compte et la délivrance automatique des clés.
- <b>Données sur les appareils</b> — le nombre d'appareils connectés et leurs identifiants (pour respecter la limite d'appareils).

<b>Nous ne collectons ni ne stockons aucune donnée de paiement.</b>
Tous les paiements sont traités exclusivement par des systèmes de paiement externes (Telegram Stars pour les utilisateurs internationaux et YooKassa pour les utilisateurs en Russie). Nous ne recevons ni le montant, ni la date, ni le mode de paiement, ni aucune autre métadonnée de paiement.

<b>2. Politique d'absence totale de journaux (No-Logs Policy)</b>
The BEYOND repose sur le protocole <b>AmneziaWG 2.0</b>, qui empêche techniquement la tenue de tout journal d'activité des utilisateurs.

<b>Nous ne collectons pas, ne stockons pas et ne pouvons pas obtenir :</b>
- Les adresses IP réelles des utilisateurs
- Les requêtes DNS
- L'historique des sites visités
- Le contenu de votre trafic
- Toute métadonnée de connexion

Aucun journal (log) de connexion n'existe, même temporairement.

<b>3. Pourquoi nous utilisons ces données</b>
Les données collectées sont utilisées exclusivement pour :
- L'autorisation et la fourniture de l'accès au Service
- La gestion de l'abonnement et du nombre d'appareils
- La réponse à vos demandes d'assistance

Nous n'utilisons pas les données à des fins publicitaires, d'analyse comportementale, de vente ou pour tout autre but.

<b>4. Conservation des données</b>
Toutes vos données (Telegram User ID et données sur les appareils) sont conservées <b>indéfiniment</b>, même après la fin de l'abonnement. Cela est nécessaire pour maintenir votre compte et permettre de renouveler l'abonnement à tout moment sans perdre votre profil.

<b>5. Transfert de données à des tiers</b>
<b>Nous ne vendons ni ne transmettons vos données à personne.</b>

<b>6. Protection des données</b>
Nous appliquons des mesures de protection techniques et organisationnelles modernes (chiffrement, limitation d'accès, audits réguliers). Seuls quelques spécialistes techniques du Service ont accès aux données, et uniquement en cas de nécessité absolue.

<b>7. Vos droits</b>
À tout moment, vous pouvez :
- Demander quelles données nous conservons à votre sujet
- Demander la suppression totale de votre Telegram User ID et de toutes les données associées (cela entraînera la suppression du compte et l'impossibilité d'utiliser le Service)
- Retirer votre consentement au traitement des données

Pour exercer ces droits, écrivez-nous en <a href="https://t.me/thebeyondnews?direct">Direct</a>.

<b>8. Modifications de la Politique</b>
Nous pouvons mettre à jour la présente Politique. La nouvelle version sera publiée dans le bot avec la mise à jour de la date. La poursuite de l'utilisation du Service après les modifications signifie que vous acceptez la Politique mise à jour."""

RefundPolicy = """<b>POLITIQUE DE REMBOURSEMENT</b>

<b>Date d'entrée en vigueur : 15 mars 2026</b>

Étant donné que le Service fournit des produits numériques (clés d'accès VPN) et des services dont la consommation commence immédiatement après le paiement et l'activation de la clé, le remboursement n'est possible que dans des <b>cas strictement limités</b>.

<b>1. Conditions de remboursement</b>
1.1. Un remboursement complet est possible <b>uniquement dans les 24 heures</b> suivant le paiement et <b>uniquement à condition</b> qu'il ait été impossible de se connecter au Service pour des raisons techniques dépendant exclusivement de nous (panne complète du serveur, erreur de génération de clé, dysfonctionnement technique du service).
1.2. Après expiration du délai de 24 heures suivant le paiement, <b>aucun remboursement</b> ne sera effectué, quelles que soient les circonstances.

<b>2. Cas où le remboursement est impossible</b>
Aucun remboursement <b>ne sera effectué</b> dans les cas suivants (même si le délai de 24 heures n'est pas dépassé) :
- Vitesse lente ou connexion instable causée par le fournisseur d'accès de l'utilisateur, la qualité du réseau mobile, la position géographique ou d'autres facteurs externes.
- Problèmes de configuration de l'application client, si la clé est techniquement valide et fonctionnelle.
- Blocage du compte ou des appareils pour violation des Règles d'utilisation (torrents, spam, DDoS, toute activité illégale).
- Décision de l'utilisateur de type « j'ai changé d'avis », « je n'en ai plus besoin », « j'ai trouvé un autre service », etc.
- Toute raison subjective non liée à une incapacité technique du Service de notre fait.

<b>3. Procédure de remboursement</b>
3.1. Pour soumettre une demande de remboursement, contactez le <a href="https://t.me/thebeyondnews?direct">support client via le bot Telegram</a>.
3.2. Votre demande doit impérativement inclure :
- Votre Telegram User ID
- Le reçu / confirmation de paiement (capture d'écran ou lien)
- Une description détaillée du problème + captures d'écran des erreurs (le cas échéant)

3.3. Chaque demande est examinée individuellement. Une décision est prise sous 48 heures. En cas d'approbation, le remboursement est effectué par le même mode de paiement que celui utilisé lors de l'achat, sous 3 à 7 jours ouvrables.

3.4. Nous nous réservons le droit de refuser un remboursement sans justification si la demande ne remplit pas les conditions énoncées à la section 1."""

