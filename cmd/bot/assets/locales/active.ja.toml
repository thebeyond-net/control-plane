PrivacyPolicy = """<b>プライバシーポリシー</b>

<b>発効日：2026年3月15日</b>

本プライバシーポリシーは、<b>The BEYOND</b>（以下「当サービス」、「当方」）の利用において、当方がどのようなデータを収集、使用、および保護するかを説明するものです。

当方はスイスに拠点を置き、世界最高水準のプライバシー基準を遵守しています。

当サービスを利用することで、利用者は本ポリシーに同意したものとみなされます。

<b>1. 収集するデータ</b>
当方は、サービスの運営に必要な<b>最小限のデータのみ</b>を収集します：
- <b>Telegram ユーザーID</b>：アカウントの識別およびアクセスキーの自動発行のため。
- <b>デバイス情報</b>：接続されているデバイスの数および識別子（デバイス数制限の遵守のため）。

<b>決済データについては、収集も保存も一切行いません。</b>
すべての決済は外部決済システム（海外ユーザー向けは Telegram Stars、ロシア国内向けは YooKassa）によってのみ処理されます。当方は、決済金額、日付、決済方法、その他のメタデータを一切受け取りません。

<b>2. ノーログポリシー (No-Logs Policy)</b>
The BEYOND は <b>AmneziaWG 2.0</b> プロトコルを採用しており、技術的に利用者のアクティビティログを記録することができない設計になっています。

<b>当方は以下の情報を収集・保存せず、取得することも不可能です：</b>
- 利用者の実際のIPアドレス
- DNSクエリ
- 閲覧履歴
- 通信内容（トラフィック）
- 接続に関するメタデータ

接続ログは一時的なものを含め、一切存在しません。

<b>3. データの利用目的</b>
収集されたデータは、以下の目的のみに使用されます：
- 認証およびサービスへのアクセス提供
- サブスクリプションおよびデバイス数の管理
- サポートへのお問い合わせ対応

広告、行動分析、データの販売、またはその他の目的でデータを使用することはありません。

<b>4. データの保持</b>
利用者のデータ（Telegram ユーザーIDおよびデバイス情報）は、サブスクリプション終了後も<b>無期限</b>に保持されます。これは、プロファイルを失うことなくいつでもサブスクリプションを再開できるようにするためです。

<b>5. 第三者へのデータ提供</b>
<b>当方が利用者のデータを第三者に販売または提供することはありません。</b>

<b>6. データの保護</b>
当方は、最新の技術的・組織的な保護措置（暗号化、アクセス制限、定期的な監査）を講じています。データにアクセスできるのは、極めて限定された技術担当者のみであり、かつ緊急時のみに制限されています。

<b>7. 利用者の権利</b>
利用者はいつでも以下の権利を行使できます：
- 保存されている自身のデータの開示請求
- Telegram ユーザーIDおよび関連データの完全削除依頼（これによりアカウントが削除され、サービスが利用できなくなります）
- データ処理に関する同意の撤回

これらの権利を行使する場合は、<a href="https://t.me/thebeyondnews?direct">Direct</a> までご連絡ください。

<b>8. ポリシーの変更</b>
当方は本ポリシーを更新することがあります。最新版は新しい日付とともにボット内で公開されます。変更後もサービスを利用し続ける場合、更新されたポリシーに同意したものとみなされます。"""

