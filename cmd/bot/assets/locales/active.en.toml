PrivacyPolicy = """<b>PRIVACY POLICY</b>

<b>Effective Date: March 15, 2025</b>

This Privacy Policy explains what data we collect, how we use and protect it when using the <b>The BEYOND</b> service (hereinafter referred to as the “Service”, “We”, “Us”).

We are based in Switzerland and adhere to the highest privacy standards.
By using our Service, you agree to this Policy.

<b>1. What Data We Collect</b>
We collect <b>only the minimum data</b> necessary for the service to function:
- <b>Telegram User ID</b> — for account identification and automatic key issuance.
- <b>Device data</b> — number of connected devices and their identifiers (to enforce device limits).

<b>We do not collect or store any payment data whatsoever.</b>
All payments are processed exclusively by external payment systems (Telegram Stars for international users and YooKassa for users from Russia). We do not receive the amount, date, payment method, or any other payment metadata.

<b>2. No-Logs Policy</b>
The BEYOND is built on the <b>AmneziaWG 2.0</b> protocol, which technically does not allow any user activity logs to be kept.
<b>We do not collect, store, or have access to:</b>
- Users’ real IP addresses
- DNS requests
- Browsing history
- Content of your traffic
- Any connection metadata

No connection logs exist, even temporarily.

<b>3. How We Use This Data</b>
The collected data is used exclusively for:
- Authorization and providing you access to the Service
- Managing your subscription and device count
- Responding to your support requests

We do not use the data for advertising, behavioral analytics, selling, or any other purposes.

<b>4. Data Storage</b>
All your data (Telegram User ID and device data) is stored <b>indefinitely</b>, even after your subscription expires. This is necessary to preserve your account and allow you to renew your subscription at any time without losing your profile.

<b>5. Transfer of Data to Third Parties</b>
<b>We do not sell or transfer your data to anyone.</b>

<b>6. Data Protection</b>
We apply modern technical and organizational protection measures (encryption, access restrictions, regular audits). Access to the data is available only to a few technical specialists of the Service and only in cases of extreme necessity.

<b>7. Your Rights</b>
At any time, you may:
- Request information about what data we store about you
- Request complete deletion of your Telegram User ID and all associated data (this will result in account deletion and inability to use the Service further)
- Withdraw consent for data processing

To exercise these rights, write to us in <a href="https://t.me/thebeyondnews?direct">Direct</a>.

<b>8. Changes to the Policy</b>
We may update this Policy. The new version will be published in the bot with a new date. Continued use of the Service after changes means you agree to the updated Policy."""

RefundPolicy = """<b>REFUND POLICY</b>

<b>Effective Date: March 15, 2025</b>

Since the Service provides digital goods (VPN access keys) and services that begin to be consumed immediately after payment and key activation, refunds are possible <b>only in strictly limited cases</b>.

<b>1. Refund Conditions</b>
1.1. A full refund is possible <b>only within 24 hours</b> from the moment of payment and <b>only if</b> it was impossible to connect to the Service due to technical reasons solely on our side (complete server failure, key generation error, technical inoperability of the service).
1.2. After 24 hours from the moment of payment, refunds <b>are not issued</b> under any circumstances.

<b>2. Cases Where Refund Is Not Possible</b>
Refunds <b>are not provided</b> in the following cases (even if less than 24 hours have passed):
- Low speed or unstable connection caused by the user’s provider, mobile network quality, geographic location, or other external factors.
- Problems with setting up the client application if the key is technically valid and functional.
- Blocking of the account or devices for violation of the Terms of Use (torrents, spam, DDoS, any illegal actions).
- User’s decision to change mind, “no longer needed”, “found another service”, etc.
- Any subjective reasons not related to the technical inoperability of the Service due to our fault.

<b>3. Refund Procedure</b>
3.1. To request a refund, write to the <a href="https://t.me/thebeyondnews?direct">support service in the Telegram bot</a>.
3.2. In your request, please provide:
- Telegram User ID
- Receipt / payment confirmation (screenshot or link)
- Detailed description of the problem + screenshots of errors (if any)
3.3. Each request is reviewed individually. A decision is made within 48 hours. If approved, the refund will be issued using the same method as the original payment, within 3–7 business days.
3.4. We reserve the right to refuse a refund without explanation if the request does not meet the conditions specified in section 1."""

